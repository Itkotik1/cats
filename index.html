<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>любовь и котики</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .photo-frame {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .caption {
            color: #ccc;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            padding: 10px;
        }

        /* Индикатор прокрутки для очень высоких фото */
        .scroll-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        /* Показываем подсказку только если есть прокрутка */
        body.has-scroll .scroll-hint {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="photo-frame">
            <img id="mainPhoto" src="we.jpeg" alt="Фотография">
        </div>
        <div class="caption">
            📸 история двух котиков в картинках
        </div>
    </div>
    <div class="scroll-hint">
        ⬇️ Прокрутите вниз ⬇️
    </div>

    <script>
        // Проверяем, есть ли прокрутка на странице
        function checkScroll() {
            if (document.body.scrollHeight > window.innerHeight) {
                document.body.classList.add('has-scroll');
            } else {
                document.body.classList.remove('has-scroll');
            }
        }

        // Проверяем при загрузке и изменении размера окна
        window.addEventListener('load', checkScroll);
        window.addEventListener('resize', checkScroll);

        // Опционально: клик по фото для открытия в полном размере
        const img = document.getElementById('mainPhoto');
        img.addEventListener('click', function() {
            // Открываем фото в новой вкладке
            window.open(this.src, '_blank');
        });

        // Добавляем курсор-указатель
        img.style.cursor = 'pointer';
    </script>
</body>
